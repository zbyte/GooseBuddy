name: Bug report
description: Report a reproducible problem in GooseBuddy
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что помогаете сделать GooseBuddy лучше. Пожалуйста, заполните поля как можно подробнее.
  - type: textarea
    id: what-happened
    attributes:
      label: Что произошло?
      description: Кратко опишите проблему.
      placeholder: При нажатии на ... приложение ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги для воспроизведения
      placeholder: |
        1. Открыть ...
        2. Нажать ...
        3. Увидеть ошибку
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Версия приложения
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: headunit
    attributes:
      label: Модель головного устройства / автомобиля
      placeholder: "Haval / GWM, год"
  - type: input
    id: android
    attributes:
      label: Версия Android
      placeholder: "Android 11"
  - type: textarea
    id: logs
    attributes:
      label: Логи / скриншоты
      description: Логи logcat, скриншоты — всё, что поможет диагностике.
      render: shell
